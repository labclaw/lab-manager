<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LabClaw Setup Wizard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#895af6",
                        "success": "#06d6a0",
                        "background-light": "#f6f5f8",
                        "background-dark": "#0f0f23",
                        "surface-dark": "#1a1a2e",
                        "border-dark": "#2d2d44",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased flex items-center justify-center min-h-screen p-4">
<!-- Setup Wizard Card -->
<div class="w-full max-w-[440px] bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-xl shadow-2xl p-8 md:p-10">
<!-- Icon Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="science">science</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight text-center mb-2">
                Welcome to LabClaw
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium text-center">
                Set up your lab in 30 seconds
            </p>
</div>
<!-- Setup Form -->
<form class="space-y-5" onsubmit="return false;">
<!-- Name Input -->
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Your Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl" data-icon="person">person</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-background-dark/50 border border-slate-200 dark:border-border-dark rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-background-dark/50 border border-slate-200 dark:border-border-dark rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="name@lab.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-background-dark/50 border border-slate-200 dark:border-border-dark rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full py-4 bg-success hover:bg-[#05c491] text-background-dark font-bold rounded-lg shadow-lg shadow-success/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                    Create Admin Account
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Info -->
<div class="mt-8 pt-6 border-t border-slate-200 dark:border-border-dark flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-slate-400 text-lg" data-icon="info">info</span>
<p class="text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider font-semibold">
                You can add more team members after setup
            </p>
</div>
</div>
<!-- Background Pattern -->
<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-success/30 rounded-full blur-[120px]"></div>
</div>
</body></html>
