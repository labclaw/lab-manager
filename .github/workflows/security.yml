name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: dependency-audit (python)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v5.4.1
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Audit Python dependencies
        # CVE-2025-69872: False positive in dev-only dependency, not exploitable in production
        # CVE-2026-4539: pygments — no fix available yet, dev-only
        # CVE-2026-25645: requests — upgrade to 2.33.0 pending upstream compatibility
        run: uv run --dev --with pip-audit pip-audit --progress-spinner off --ignore CVE-2025-69872 --ignore CVE-2026-4539 --ignore CVE-2026-25645

  npm-audit:
    name: dependency-audit (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web/
        run: npm ci

      - name: Audit npm dependencies
        working-directory: web/
        run: npm audit --audit-level=high

  bandit:
    name: bandit-sast
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v5.4.1
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run bandit SAST scan
        # B324: hashlib.md5 used for cache keys, not cryptographic security
        run: uv run bandit -r src/lab_manager -f json -o bandit-report.json -ll --skip B324

      - name: Display results
        if: always()
        run: uv run bandit -r src/lab_manager -f screen -ll --skip B324

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-report
          path: bandit-report.json

  license-check:
    name: license-check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v5.4.1
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Check licenses
        run: |
          uv run pip install pip-licenses
          uv run pip-licenses --order=license --fail-on="GNU General Public License v3 (GPLv3);GNU General Public License v2 (GPLv2)" \
            --allow-only="MIT License;BSD License;Apache Software License;ISC License (ISCL);Python Software Foundation License;Mozilla Public License 2.0 (MPL 2.0);BSD-2-Clause;BSD-3-Clause;Apache-2.0;MIT;ISC;PSF;HPND;Zlib;Public Domain;The Unlicense (Unlicense)" \
            || echo "::warning::Some dependencies have non-permissive licenses. Review the output above."

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request'
    continue-on-error: true  # GHAS required; free once repo is public
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1

  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.0"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfLO "${BASE_URL}/${ARCHIVE}"
          curl -sSfLO "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${ARCHIVE}\$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
          tar xzf "${ARCHIVE}"
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose
