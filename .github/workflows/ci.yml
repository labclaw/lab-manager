name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, build, test)
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web/
        run: npm ci

      - name: Type check
        working-directory: web/
        run: npx tsc --noEmit

      - name: Build
        working-directory: web/
        run: npm run build

      - name: Test
        working-directory: web/
        run: npm test

  lint:
    name: lint
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: typecheck
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Install mypy
        run: uv run pip install mypy

      - name: Mypy type check
        run: uv run mypy src/lab_manager/

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: self-hosted
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - python-version: "3.12"
            postgres-port: 25433
            meilisearch-port: 27701
          - python-version: "3.13"
            postgres-port: 25434
            meilisearch-port: 27702

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: labmanager
          POSTGRES_PASSWORD: labmanager
          POSTGRES_DB: labmanager
        ports:
          - ${{ matrix.postgres-port }}:5432
        options: >-
          --health-cmd="pg_isready -U labmanager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - ${{ matrix.meilisearch-port }}:7700
        env:
          MEILI_ENV: development

    env:
      DATABASE_URL: postgresql+psycopg://labmanager:labmanager@localhost:${{ matrix.postgres-port }}/labmanager
      MEILISEARCH_URL: http://localhost:${{ matrix.meilisearch-port }}
      AUTH_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest --tb=short -q \
            --ignore=tests/bdd/step_defs \
            --cov=lab_manager \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml

  package:
    name: package
    runs-on: self-hosted
    timeout-minutes: 15
    needs:
      - lint
      - typecheck
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: |
          rm -rf dist
          uv build --sdist --wheel

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/*
