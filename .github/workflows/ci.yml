name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Stage 1: Code Quality ─────────────────────────────────────
  conventional-commits:
    name: conventional-commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          set -euo pipefail
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'
          BAD=0
          while IFS= read -r msg; do
            # Skip merge commits (created by GitHub PR merges)
            echo "$msg" | grep -qE '^Merge ' && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Non-conventional commit: $msg"
              BAD=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)
          if [ "$BAD" -eq 1 ]; then
            echo "::error::All commits must follow Conventional Commits (https://www.conventionalcommits.org)"
            exit 1
          fi
          echo "All commits follow Conventional Commits format."

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Install type stubs
        run: uv run pip install types-PyYAML

      - name: Mypy type check
        run: uv run mypy src/lab_manager/

  # ─── Stage 2: Tests ────────────────────────────────────────────
  frontend:
    name: frontend (lint, type-check, build, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web/
        run: npm ci

      - name: ESLint
        working-directory: web/
        run: npm run lint || echo "::warning::ESLint found errors. Non-blocking until pre-existing issues are fixed."

      - name: Type check
        working-directory: web/
        run: npx tsc --noEmit

      - name: Build
        working-directory: web/
        run: npm run build

      - name: Test
        working-directory: web/
        run: npm test || echo "::warning::Frontend tests failed (flaky CloudBrain async tests). Non-blocking."

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: labmanager
          POSTGRES_PASSWORD: labmanager
          POSTGRES_DB: labmanager
        ports:
          - 25432:5432
        options: >-
          --health-cmd="pg_isready -U labmanager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 27700:7700
        env:
          MEILI_ENV: development

    env:
      DATABASE_URL: postgresql+psycopg://labmanager:labmanager@localhost:25432/labmanager
      MEILISEARCH_URL: http://localhost:27700
      AUTH_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest --tb=short -q \
            --ignore=tests/bdd \
            --deselect=tests/test_coverage_gaps2.py::TestRagInternals \
            --deselect=tests/test_coverage_gaps.py::TestRagService::test_ask_format_fails \
            --deselect=tests/test_coverage_gaps.py::TestRagService::test_ask_success \
            --deselect=tests/test_pipeline_e2e.py::TestBackgroundExtraction \
            --deselect=tests/test_pipeline_e2e.py::TestExtractionFailurePaths \
            --cov=lab_manager \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml

  # ─── Stage 2b: E2E Tests ──────────────────────────────────────
  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web/
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web/
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        working-directory: web/
        run: npm run build

      - name: Start Vite preview server
        working-directory: web/
        run: npx vite preview --port 5173 &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:5173 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        working-directory: web/
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ─── Stage 3: Package ──────────────────────────────────────────
  package:
    name: package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - lint
      - typecheck
      - test
      - frontend
      - e2e

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: |
          rm -rf dist
          uv build --sdist --wheel

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/*
