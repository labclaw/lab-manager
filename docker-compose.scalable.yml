# docker-compose.scalable.yml — Scalable deployment overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.scalable.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.scalable.yml up -d --scale app=3
#
# Adds:
#   - Redis (caching layer for read-heavy endpoints)
#   - PgBouncer (connection pooling proxy for multi-worker scaling)
#
# The base docker-compose.yml provides: db, search, app, caddy, tunnel

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 768m
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-labmanager}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-labmanager}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      SERVER_CONNECT_TIMEOUT: 5
      QUERY_TIMEOUT: 30
      CLIENT_IDLE_TIMEOUT: 600
      AUTH_TYPE: scram-sha-256
    ports:
      - "127.0.0.1:6432:6432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

  # Override app to use Redis and PgBouncer
  app:
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-labmanager}:${POSTGRES_PASSWORD:?err}@pgbouncer:6432/${POSTGRES_DB:-labmanager}
      REDIS_URL: redis://redis:6379/0
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-20}
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

volumes:
  redis_data:
