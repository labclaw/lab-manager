name: shenlab-manager
region: nyc

services:
  - name: app
    github:
      repo: labclaw/lab-manager
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: MEILISEARCH_URL
        scope: RUN_TIME
        value: http://search:7700
      - key: MEILISEARCH_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: changeme-meilisearch-key
      - key: ADMIN_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: MEILI_MASTER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: LAB_NAME
        scope: RUN_TIME
        value: "Shen Lab"
      - key: LAB_SUBTITLE
        scope: RUN_TIME
        value: "Massachusetts General Hospital"
      - key: AUTH_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: SECURE_COOKIES
        scope: RUN_TIME
        value: "true"
      - key: LOG_FORMAT
        scope: RUN_TIME
        value: "json"
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET

  - name: search
    image:
      registry_type: DOCKER_HUB
      registry: getmeili
      repository: meilisearch
      tag: v1.12
    internal_ports:
      - 7700
    instance_count: 1
    instance_size_slug: professional-s
    envs:
      - key: MEILI_ENV
        scope: RUN_TIME
        value: production
      - key: MEILI_MASTER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MEILI_NO_ANALYTICS
        scope: RUN_TIME
        value: "true"

# NOTE: Production uses a standalone managed database (not embedded).
# The DATABASE_URL env var is set directly to the standalone DB URI.
# The embedded database section below is kept as a reference for new deployments.
# To use embedded DB, uncomment and set DATABASE_URL to ${db.DATABASE_URL}.
# databases:
#   - name: db
#     engine: PG
#     version: "16"
#     size: db-s-1vcpu-1gb
#     num_nodes: 1
