#cloud-config
# Lab Manager — DigitalOcean Cloud-Init
# This runs on first boot to set up a fully working Lab Manager instance.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - ufw
  - jq

users:
  - name: labclaw
    groups: sudo, docker
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - ${SSH_PUBLIC_KEY}

write_files:
  - path: /opt/labclaw/setup.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      LOG="/var/log/labclaw-setup.log"
      exec > >(tee -a "$LOG") 2>&1
      echo "=== Lab Manager setup started at $(date -u) ==="

      # Install Docker
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt-get update -qq
      apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      systemctl enable docker
      systemctl start docker

      # Clone repo
      mkdir -p /opt/labclaw
      if [[ ! -d /opt/labclaw/lab-manager ]]; then
          git clone https://github.com/labclaw/lab-manager.git /opt/labclaw/lab-manager
      fi
      cd /opt/labclaw/lab-manager

      # Generate secrets
      gen_pw() { tr -dc 'A-Za-z0-9' < /dev/urandom | head -c "$1"; }
      gen_hex() { tr -dc 'a-f0-9' < /dev/urandom | head -c "$1"; }

      POSTGRES_PASSWORD=$(gen_pw 32)
      POSTGRES_RO_PASSWORD=$(gen_pw 32)
      MEILI_MASTER_KEY=$(gen_pw 32)
      ADMIN_SECRET_KEY=$(gen_hex 64)
      ADMIN_PASSWORD=$(gen_pw 16)

      # Get droplet IP
      DROPLET_IP=$(curl -s http://169.254.169.254/metadata/v1/interfaces/public/0/ipv4/address 2>/dev/null || hostname -I | awk '{print $1}')

      # Write .env (non-interactive defaults)
      cat > .env <<EOF
      # Lab Manager — Auto-generated by cloud-init on $(date -u +"%Y-%m-%d %H:%M:%S UTC")
      DOMAIN=localhost
      POSTGRES_USER=labmanager
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_DB=labmanager
      POSTGRES_RO_PASSWORD=${POSTGRES_RO_PASSWORD}
      ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      ADMIN_PASSWORD=${ADMIN_PASSWORD}
      AUTH_ENABLED=true
      SECURE_COOKIES=false
      MEILI_ENV=production
      MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      GEMINI_API_KEY=
      EXTRACTION_MODEL=gemini-3.1-flash-preview
      RAG_MODEL=gemini-2.5-flash
      EOF
      # Remove leading whitespace from heredoc
      sed -i 's/^      //' .env
      chmod 600 .env

      # Save admin password for MOTD
      echo "$ADMIN_PASSWORD" > /opt/labclaw/.admin_password
      chmod 600 /opt/labclaw/.admin_password

      # Deploy
      docker compose up -d --build

      # Wait for health
      for i in $(seq 1 30); do
          if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "=== Lab Manager is healthy ==="
              break
          fi
          sleep 2
      done

      echo "=== Setup completed at $(date -u) ==="

  - path: /opt/labclaw/backup-db.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      BACKUP_DIR="/opt/labclaw/backups"
      mkdir -p "$BACKUP_DIR"
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      cd /opt/labclaw/lab-manager
      docker compose exec -T db pg_dump -U labmanager labmanager | gzip > "${BACKUP_DIR}/labmanager_${TIMESTAMP}.sql.gz"
      # Keep only last 7 days
      find "$BACKUP_DIR" -name "labmanager_*.sql.gz" -mtime +7 -delete
      echo "Backup completed: labmanager_${TIMESTAMP}.sql.gz"

  - path: /etc/systemd/system/labclaw-backup.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Lab Manager Database Backup
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      ExecStart=/opt/labclaw/backup-db.sh
      User=root

  - path: /etc/systemd/system/labclaw-backup.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Daily Lab Manager Database Backup

      [Timer]
      OnCalendar=*-*-* 02:00:00
      Persistent=true
      RandomizedDelaySec=300

      [Install]
      WantedBy=timers.target

  - path: /etc/motd
    permissions: "0644"
    content: |

      ====================================================
        Lab Manager by LabClaw
      ====================================================

        Status:   docker compose -f /opt/labclaw/lab-manager/docker-compose.yml ps
        Logs:     docker compose -f /opt/labclaw/lab-manager/docker-compose.yml logs -f
        Config:   /opt/labclaw/lab-manager/.env
        Backups:  /opt/labclaw/backups/

        Admin password is stored in: /opt/labclaw/.admin_password
        View it:  cat /opt/labclaw/.admin_password

        To add a Gemini API key:
          1. Edit /opt/labclaw/lab-manager/.env
          2. Set GEMINI_API_KEY=your-key
          3. Run: cd /opt/labclaw/lab-manager && docker compose up -d

      ====================================================

runcmd:
  # Configure UFW firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Run the setup script
  - bash /opt/labclaw/setup.sh

  # Enable backup timer
  - systemctl daemon-reload
  - systemctl enable labclaw-backup.timer
  - systemctl start labclaw-backup.timer

  # Set ownership
  - chown -R labclaw:labclaw /opt/labclaw
