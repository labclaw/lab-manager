# Shen Lab — Docker Compose Override
# Place alongside docker-compose.yml to mount lab-specific data volumes.
# Docker Compose automatically merges override files.
#
# Usage:
#   cp deploy/examples/shenlab/docker-compose.override.yml .
#   docker compose up -d
services:
  app:
    volumes:
      - ./data/shenlab-docs:/app/shenlab-docs:ro
      - ./data/shenlab-devices:/app/shenlab-devices:ro
    environment:
      SCANS_DIR: /app/shenlab-docs
      DEVICES_DIR: /app/shenlab-devices
