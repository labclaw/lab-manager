<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabClaw - Lab Manager</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>LabClaw</h1>
    <div class="subtitle">Lab Manager</div>
    <div id="login-error" class="login-error"></div>
    <form id="login-form" onsubmit="Lab.auth.handleLogin(event)">
      <input type="email" id="login-email" placeholder="Email" required autocomplete="email" autofocus>
      <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<!-- Main app (hidden until authenticated) -->
<div id="main-app" class="hidden">
<nav class="navbar">
  <h1>LabClaw</h1>
  <div class="nav-links">
    <button class="active" data-view="dashboard" onclick="window.location.hash='#/dashboard'">Dashboard</button>
    <button data-view="documents" onclick="window.location.hash='#/documents'">Documents</button>
    <button data-view="review" onclick="window.location.hash='#/review'">Review Queue</button>
    <button data-view="inventory" onclick="window.location.hash='#/inventory'">Inventory</button>
    <button data-view="orders" onclick="window.location.hash='#/orders'">Orders</button>
  </div>
  <div class="nav-search">
    <input type="text" id="nav-search-input" placeholder="Search...">
    <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
  </div>
  <div class="user-info">
    <span class="user-name" id="user-name"></span>
    <button class="btn-logout" onclick="Lab.auth.handleLogout()">Sign Out</button>
  </div>
</nav>

<div class="container">
  <!-- Dashboard View -->
  <div id="view-dashboard">
    <div class="stats-grid" id="stats-grid"></div>
    <div id="dashboard-alerts"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div class="stat-card">
        <div class="label">Top Vendors</div>
        <div id="vendor-chart" style="margin-top: 12px;"></div>
      </div>
      <div class="stat-card">
        <div class="label">Document Types</div>
        <div id="type-chart" style="margin-top: 12px;"></div>
      </div>
    </div>
  </div>

  <!-- Documents View -->
  <div id="view-documents" class="hidden">
    <div class="filters">
      <input type="text" id="doc-search-input" placeholder="Search vendor or filename...">
      <div style="display:flex; gap:4px;">
        <button class="filter-btn active" data-status="" onclick="Lab.documents.setFilter('')">All</button>
        <button class="filter-btn" data-status="approved" onclick="Lab.documents.setFilter('approved')">Approved</button>
        <button class="filter-btn" data-status="needs_review" onclick="Lab.documents.setFilter('needs_review')">Needs Review</button>
        <button class="filter-btn" data-status="rejected" onclick="Lab.documents.setFilter('rejected')">Rejected</button>
      </div>
    </div>
    <div id="doc-table"></div>
  </div>

  <!-- Review Queue View -->
  <div id="view-review" class="hidden">
    <div style="margin-bottom: 16px;">
      <h2 style="font-size: 18px; margin-bottom: 4px;">Review Queue</h2>
      <p style="color: var(--text-muted); font-size: 14px;">Documents that need human verification before entering the database.</p>
    </div>
    <div id="review-bulk-bar" class="bulk-bar hidden"></div>
    <div id="review-table"></div>
  </div>

  <!-- Inventory View -->
  <div id="view-inventory" class="hidden">
    <div class="filters">
      <input type="text" id="inv-search-input" placeholder="Search inventory...">
      <div style="display:flex; gap:4px;">
        <button class="filter-btn" onclick="Lab.inventory.setFilter('status', '')">All</button>
        <button class="filter-btn" onclick="Lab.inventory.showLowStock()">Low Stock</button>
        <button class="filter-btn" onclick="Lab.inventory.showExpiring()">Expiring Soon</button>
      </div>
    </div>
    <div id="inventory-table"></div>
  </div>

  <!-- Orders View -->
  <div id="view-orders" class="hidden">
    <div class="filters">
      <input type="text" id="ord-search-input" placeholder="Search PO number...">
    </div>
    <div id="orders-table"></div>
  </div>

  <!-- Search View -->
  <div id="view-search" class="hidden">
    <div style="margin-bottom: 16px;">
      <h2 style="font-size: 18px; margin-bottom: 8px;">Search Results</h2>
      <input type="text" id="search-main-input" style="width:100%; max-width:600px; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:15px;" placeholder="Search across all data..." onkeydown="if(event.key==='Enter') Lab.search.doSearch(this.value)">
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- Detail side panel -->
<div class="overlay" id="overlay" onclick="Lab.components.closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <h2 id="detail-title">Detail</h2>
    <button class="close-btn" onclick="Lab.components.closePanel()">&times;</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="actions" id="detail-actions"></div>
</div>

<!-- Generic modal -->
<div id="generic-modal" class="modal">
  <div class="modal-card">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
      <button class="btn" id="modal-confirm-btn">Confirm</button>
    </div>
  </div>
</div>

</div><!-- /main-app -->

<!-- JS modules loaded in dependency order -->
<script src="/static/js/api.js"></script>
<script src="/static/js/components.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/documents.js"></script>
<script src="/static/js/review.js"></script>
<script src="/static/js/inventory.js"></script>
<script src="/static/js/orders.js"></script>
<script src="/static/js/search.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
