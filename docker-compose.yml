services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: labmanager
      POSTGRES_PASSWORD: labmanager
      POSTGRES_DB: labmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-readonly-user.sql:/docker-entrypoint-initdb.d/01-readonly-user.sql:ro

  search:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    volumes:
      - msdata:/meili_data
    environment:
      MEILI_ENV: development

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://labmanager:labmanager@db:5432/labmanager
      DATABASE_READONLY_URL: postgresql+psycopg://labmanager_ro:labmanager_ro@db:5432/labmanager
      MEILISEARCH_URL: http://search:7700
    depends_on:
      - db
      - search
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  msdata:
  uploads:
