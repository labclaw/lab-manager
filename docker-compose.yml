# docker-compose.yml — Production deployment
# cp .env.example .env && docker compose up -d
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-labmanager}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD:?Set POSTGRES_RO_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-readonly-user.sh:/docker-entrypoint-initdb.d/01-readonly-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 2g
    restart: unless-stopped

  search:
    image: getmeili/meilisearch:v1.12
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - msdata:/meili_data
    environment:
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY in .env}
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 2g
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    mem_limit: 1g
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-labmanager}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-labmanager}
      DATABASE_READONLY_URL: ${DATABASE_READONLY_URL:-}
      MEILISEARCH_URL: http://search:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:?err}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:?Set ADMIN_SECRET_KEY in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-gemini-2.5-flash}
      EXTRACTION_API_KEY: ${GEMINI_API_KEY:-}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-gemini-2.5-flash}
      RAG_MODEL: ${RAG_MODEL:-gemini-2.5-flash}
      RAG_API_KEY: ${RAG_API_KEY:-}
      RAG_BASE_URL: ${RAG_BASE_URL:-}
      NVIDIA_BUILD_API_KEY: ${NVIDIA_BUILD_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      SCANS_DIR: ${SCANS_DIR:+/app/scans}
      DEVICES_DIR: ${DEVICES_DIR:+/app/lab-devices}
    depends_on:
      db:
        condition: service_healthy
      search:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - backups:/backups/labmanager
      - ${SCANS_DIR:-./docker/empty/scans}:/app/scans:ro
      - ${DEVICES_DIR:-./docker/empty/devices}:/app/lab-devices:ro
    restart: unless-stopped

  # Cloudflare Tunnel — exposes the service to the internet
  # Set CLOUDFLARED_TOKEN in .env to enable
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TOKEN:-}
    depends_on:
      - caddy
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  pgdata:
  msdata:
  uploads:
  backups:
  caddy_data:
  caddy_config:
